<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{.Title}}</title>
  <link rel="icon" href="web/static/img/icon.png" type="image/png">
  <link rel="stylesheet" href="/web/static/css/layout.css" />
  <script src="/web/static/js/layout.js" defer></script>
  {{block "head" .}}{{end}}
</head>

<body>

<div id="cursor"></div>

<nav>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/me">Me</a>
    <a href="/contacts">Contacts</a>
    <a href="/docs">Documentation</a>
  </div>

  {{if .Username}}
  <div class="user-menu" data-user-menu>
    <button class="profile-button" type="button" data-user-menu-button aria-haspopup="true" aria-expanded="false">
      <span class="profile-avatar" aria-hidden="true">{{.Initials}}</span>
      <span class="profile-name">{{.Username}}</span>
    </button>
    <div class="user-dropdown" data-user-dropdown hidden>
      <form method="post" action="/logout">
        <button type="submit">Logout</button>
      </form>
    </div>
  </div>
  {{end}}
</nav>

<main>
  <div class="container">
    {{template "content" .}}
  </div>
  <footer class="footer">
    <p>© 2026 Jaylubiny</p>
  </footer>
</main>

</body>
</html>
